meters:
  - name: ticket
    description: Ticketed-segment unit underlying GDS / NDC distribution economics — not directly metered through an API.
    unit: ticket
    aggregation: sum
    dimensions:
      - channel
principles:
  - name: Visibility
    description: Track distribution cost as GDS / NDC messaging and commission spend on the airline P&L.
  - name: Allocation
    description: Allocate distribution and partner cost to commercial / revenue-management; allocate corporate-travel cost to the buyer's T&E line.
  - name: Optimization
    description: Optimize by steering eligible content from GDS to NDC channels where commercials are favorable.
  - name: Accountability
    description: Distribution / revenue-management leadership owns commercial terms; IT owns the underlying integration runtime.
